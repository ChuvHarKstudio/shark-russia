<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHARK RUSSIA MOBILE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020a16; font-family: sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; padding: 20px; }
        #money { color: #2ecc71; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; }
        #joy-zone { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid #3498db; border-radius: 50%; position: absolute; left: 30px; bottom: 30px; pointer-events: auto; touch-action: none; }
        #joy-stick { width: 50px; height: 50px; background: #3498db; border-radius: 50%; position: absolute; left: 35px; top: 35px; }
        #start { position: fixed; inset: 0; background: #090a0f; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        button { padding: 20px 60px; background: #3498db; color: white; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="start">
    <h1 style="color:#3498db">SHARK RUSSIA</h1>
    <p>Мобильный билд v1.0</p>
    <button onclick="go()">ИГРАТЬ</button>
</div>

<div id="ui">
    <div id="money">$500,000</div>
    <div id="joy-zone"><div id="joy-stick"></div></div>
</div>

<script>
let scene, camera, renderer, player, move = { x: 0, z: 0 };

function addBox(w, h, d, x, z, col) {
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshBasicMaterial({ color: col })
    );
    mesh.position.set(x, h/2, z);
    scene.add(mesh);
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05101a); // ТЕМНО-СИНЕЕ НЕБО

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ЗЕМЛЯ (Асфальт)
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(1000, 1000),
        new THREE.MeshBasicMaterial({ color: 0x111111 })
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    // ДОРОГА (Разметка)
    const road = new THREE.GridHelper(200, 20, 0x3498db, 0x222222);
    scene.add(road);

    // ГОРОД (Цветные здания - ТЕПЕРЬ ИХ ТОЧНО БУДЕТ ВИДНО)
    addBox(10, 20, 10, 30, 30, 0xffffff); // Белая Мэрия
    addBox(15, 12, 15, -40, 20, 0xff0000); // КРАСНОЕ КАЗИНО
    addBox(8, 25, 8, 20, -40, 0x00ff00); // Зеленый Банк
    addBox(12, 10, 20, -30, -30, 0x0000ff); // Синий Автосалон

    // ИГРОК
    player = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.5, 1),
        new THREE.MeshBasicMaterial({ color: 0x3498db })
    );
    player.position.y = 1;
    scene.add(player);

    // УПРАВЛЕНИЕ
    const jZone = document.getElementById('joy-zone');
    const jStick = document.getElementById('joy-stick');
    jZone.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        const r = jZone.getBoundingClientRect();
        let dx = t.clientX - (r.left + 60);
        let dy = t.clientY - (r.top + 60);
        const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
        const a = Math.atan2(dy, dx);
        jStick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        move.x = Math.cos(a)*(d/40); move.z = -Math.sin(a)*(d/40);
    });
    jZone.addEventListener('touchend', () => { jStick.style.transform = 'none'; move = {x:0,z:0}; });

    loop();
}

function loop() {
    requestAnimationFrame(loop);
    if(move.z !== 0) player.translateZ(move.z * 0.3);
    if(move.x !== 0) player.rotation.y -= move.x * 0.08;
    
    // КАМЕРА (За спиной)
    camera.position.set(
        player.position.x - Math.sin(player.rotation.y) * 10,
        player.position.y + 6,
        player.position.z - Math.cos(player.rotation.y) * 10
    );
    camera.lookAt(player.position);
    renderer.render(scene, camera);
}

window.go = () => { document.getElementById('start').style.display = 'none'; init(); };
</script>
</body>
</html>
