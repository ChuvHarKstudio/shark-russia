<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHARK RUSSIA | REAL CITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #010a13; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; padding: 20px; }
        #money { color: #2ecc71; font-size: 28px; text-shadow: 2px 2px #000; }
        #joy-bound { width: 140px; height: 140px; background: rgba(0,0,0,0.5); border: 4px solid #3498db; border-radius: 50%; position: absolute; left: 30px; bottom: 30px; pointer-events: auto; touch-action: none; }
        #joy-stick { width: 60px; height: 60px; background: #3498db; border-radius: 50%; position: absolute; left: 40px; top: 40px; box-shadow: 0 0 15px #3498db; }
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1b2735 0%, #090a0f 100%); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        input { padding: 15px; border-radius: 5px; border: 2px solid #3498db; width: 250px; background: #000; color: #fff; font-size: 18px; margin: 10px; }
        button { padding: 20px 60px; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 22px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="font-size: 50px; margin-bottom: 5px;">SHARK<br><span style="color:#3498db">RUSSIA</span></h1>
    <p style="color: #bdc3c7;">3D Mobile RolePlay</p>
    <input type="text" id="nick" placeholder="Name_Surname">
    <button onclick="startGame()">Войти в игру</button>
</div>

<div id="ui">
    <div id="money">$500,000</div>
    <div id="joy-bound"><div id="joy-stick"></div></div>
</div>

<script>
let scene, camera, renderer, player, joystick, stick, move = { x: 0, z: 0 };

function createBuilding(w, h, d, x, z, color, name) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({ color: color });
    const b = new THREE.Mesh(geo, mat);
    b.position.set(x, h/2, z);
    scene.add(b);
    
    // Окна (светящиеся точки)
    const winGeo = new THREE.PlaneGeometry(0.5, 0.5);
    const winMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
    for(let i=0; i<5; i++) {
        const win = new THREE.Mesh(winGeo, winMat);
        win.position.set(x + w/2 + 0.01, h - (i*2) - 1, z);
        win.rotation.y = Math.PI/2;
        scene.add(win);
    }
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020a16);
    scene.fog = new THREE.Fog(0x020a16, 20, 120);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: false }); // Для скорости на мобилках
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Свет
    scene.add(new THREE.AmbientLight(0x404040, 1.5));
    const sun = new THREE.DirectionalLight(0x3498db, 1);
    sun.position.set(50, 50, 50);
    scene.add(sun);

    // Дороги и карта
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    // Разметка дороги
    const road = new THREE.GridHelper(400, 40, 0x333333, 0x333333);
    scene.add(road);

    // ЗДАНИЯ ГОРОДА
    createBuilding(10, 30, 10, 20, 20, 0x2c3e50, "Мэрия");
    createBuilding(15, 10, 15, -25, 30, 0xc0392b, "Shark Казино"); // КАЗИНО
    createBuilding(8, 20, 8, 15, -25, 0x27ae60, "Банк");
    createBuilding(12, 15, 20, -30, -30, 0x2980b9, "Автосалон");
    
    // Игрок
    player = new THREE.Group();
    const pBody = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1), new THREE.MeshStandardMaterial({ color: 0x3498db }));
    pBody.position.y = 1;
    player.add(pBody);
    scene.add(player);

    // Управление
    joystick = document.getElementById('joy-bound');
    stick = document.getElementById('joy-stick');

    const handleTouch = (e) => {
        const t = e.touches[0];
        const r = joystick.getBoundingClientRect();
        let dx = t.clientX - (r.left + 70);
        let dy = t.clientY - (r.top + 70);
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
        const angle = Math.atan2(dy, dx);
        stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        move.x = Math.cos(angle) * (dist/50);
        move.z = -Math.sin(angle) * (dist/50);
    };

    joystick.addEventListener('touchmove', handleTouch);
    joystick.addEventListener('touchend', () => { stick.style.transform = 'none'; move = {x:0, z:0}; });

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(move.z !== 0) player.translateZ(move.z * 0.35);
    if(move.x !== 0) player.rotation.y -= move.x * 0.08;
    
    // Камера за спиной
    const camOffset = new THREE.Vector3(0, 6, -12).applyMatrix4(player.matrixWorld);
    camera.position.lerp(camOffset, 0.1);
    camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
    
    renderer.render(scene, camera);
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    init();
}
</script>
</body>
</html>
