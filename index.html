<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHARK RUSSIA MOBILE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        #money { color: #2ecc71; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
        #joy-bound { width: 150px; height: 150px; background: rgba(255,255,255,0.1); border: 3px solid #3498db; border-radius: 50%; position: relative; pointer-events: auto; touch-action: none; }
        #joy-stick { width: 60px; height: 60px; background: #3498db; border-radius: 50%; position: absolute; left: 45px; top: 45px; box-shadow: 0 0 20px #3498db; }
        #start-screen { position: fixed; inset: 0; background: #010a13; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        input { padding: 15px; border-radius: 10px; border: none; width: 200px; margin: 10px; font-size: 18px; }
        button { padding: 15px 50px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 20px; box-shadow: 0 5px 0 #2980b9; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="font-size: 40px; color: #3498db;">SHARK RUSSIA</h1>
    <input type="text" id="nick" placeholder="Введите ник...">
    <button onclick="startGame()">ИГРАТЬ</button>
</div>

<div id="ui">
    <div id="money">$500,000</div>
    <div id="joy-bound"><div id="joy-stick"></div></div>
</div>

<script>
let scene, camera, renderer, player, joystick, stick;
let move = { x: 0, z: 0 };

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.Fog(0x050505, 10, 100);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Свет
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040, 2));

    // Земля (Сетка как в Tron/Shark стиле)
    const grid = new THREE.GridHelper(200, 50, 0x3498db, 0x222222);
    scene.add(grid);

    // Игрок (Синяя капсула)
    const geo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
    const mat = new THREE.MeshStandardMaterial({ color: 0x3498db, emissive: 0x111111 });
    player = new THREE.Mesh(geo, mat);
    player.position.y = 1;
    scene.add(player);

    // Управление
    joystick = document.getElementById('joy-bound');
    stick = document.getElementById('joy-stick');

    joystick.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        const r = joystick.getBoundingClientRect();
        const centerX = r.left + r.width/2;
        const centerY = r.top + r.height/2;
        let dx = t.clientX - centerX;
        let dy = t.clientY - centerY;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
        const angle = Math.atan2(dy, dx);
        
        stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        move.x = Math.cos(angle) * (dist/50);
        move.z = -Math.sin(angle) * (dist/50);
    });

    joystick.addEventListener('touchend', () => {
        stick.style.transform = 'translate(0,0)';
        move = { x: 0, z: 0 };
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(move.z !== 0) player.translateZ(move.z * 0.3);
    if(move.x !== 0) player.rotation.y -= move.x * 0.08;

    camera.position.lerp(new THREE.Vector3(
        player.position.x - Math.sin(player.rotation.y) * 8,
        player.position.y + 5,
        player.position.z - Math.cos(player.rotation.y) * 8
    ), 0.1);
    camera.lookAt(player.position);

    renderer.render(scene, camera);
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    init();
}

window.addEventListener('resize', () => {
    if(camera) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
});
</script>
</body>
</html>
